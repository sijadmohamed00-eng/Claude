<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Claude - Mobile</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background-color: #1a1a1a;
            color: #e5e5e5;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .container {
            display: flex;
            height: 100vh;
            height: 100dvh;
            position: relative;
        }

        /* Sidebar - Mobile Overlay */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 85%;
            max-width: 320px;
            background-color: #1e1e1e;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.25s ease-out;
            box-shadow: 4px 0 20px rgba(0,0,0,0.5);
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.6);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s;
        }

        .sidebar-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #333;
            background-color: #1e1e1e;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
        }

        .back-arrow {
            width: 24px;
            height: 24px;
            opacity: 0.8;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: none;
            border: none;
            color: #ff6b35;
            font-size: 16px;
            padding: 10px 0;
            cursor: pointer;
            width: 100%;
            font-weight: 500;
        }

        .plus-icon {
            width: 24px;
            height: 24px;
            background-color: #ff6b35;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .sidebar-nav {
            padding: 16px;
            border-bottom: 1px solid #333;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 4px;
            color: #ccc;
            font-size: 16px;
            cursor: pointer;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            opacity: 0.8;
        }

        .sidebar-content {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .section-title {
            font-size: 13px;
            color: #888;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .recent-item {
            padding: 12px 0;
            color: #ccc;
            font-size: 15px;
            cursor: pointer;
            border-bottom: 1px solid #2a2a2a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-state {
            padding: 16px 0;
            text-align: center;
            color: #777;
        }

        .sidebar-footer {
            padding: 20px 16px;
            border-top: 1px solid #333;
            margin-top: auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            background-color: #ff6b35;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 600;
        }

        .user-name {
            font-size: 16px;
            color: #fff;
            font-weight: 500;
        }

        .user-plan {
            font-size: 13px;
            color: #888;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #1a1a1a;
            width: 100%;
            position: relative;
        }

        /* Mobile Header */
        .mobile-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #fff;
            padding: 8px;
            margin-right: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background-color 0.2s;
        }

        .menu-btn:active {
            background-color: #333;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            flex: 1;
        }

        .header-actions {
            display: flex;
            gap: 4px;
        }

        .header-btn {
            background: none;
            border: none;
            color: #ccc;
            padding: 8px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-btn:active {
            background-color: #333;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 12px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .welcome-screen {
            display: flex;
            flex-direction: column;
            flex: 1;
            padding: 16px 8px;
            overflow-y: auto;
        }

        .chat-container {
            display: none;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        .chat-container.active {
            display: flex;
        }

        .greeting {
            font-size: 26px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sun-icon {
            width: 32px;
            height: 32px;
            color: #ff6b35;
        }

        .search-container {
            width: 100%;
            position: relative;
            margin-bottom: 20px;
        }

        .chat-container .search-container {
            position: sticky;
            bottom: 0;
            background-color: #1a1a1a;
            padding: 12px 0 8px;
            margin: 0;
        }

        .search-input {
            width: 100%;
            padding: 14px 100px 14px 16px;
            background-color: #262626;
            border: 1.5px solid #3a3a3a;
            border-radius: 24px;
            color: #fff;
            font-size: 16px;
            outline: none;
            resize: none;
            min-height: 52px;
            max-height: 120px;
            font-family: inherit;
            line-height: 1.4;
        }

        .search-input:focus {
            border-color: #ff6b35;
        }

        .search-actions {
            position: absolute;
            right: 8px;
            bottom: 8px;
            display: flex;
            gap: 4px;
        }

        .send-btn {
            padding: 10px;
            background-color: #ff6b35;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .send-btn:active {
            background-color: #e05a2b;
        }

        .send-btn:disabled {
            background-color: #444;
        }

        .model-selector {
            align-self: flex-end;
            margin-bottom: 16px;
        }

        .model-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #ddd;
            font-size: 14px;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            background-color: #262626;
            border: 1px solid #3a3a3a;
            border-radius: 24px;
            color: #e5e5e5;
            font-size: 15px;
            cursor: pointer;
            flex: 1 0 calc(50% - 5px);
            justify-content: center;
            font-weight: 500;
        }

        .action-btn:active {
            background-color: #333;
        }

        .action-icon {
            width: 18px;
            height: 18px;
            opacity: 0.9;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 4px;
            margin-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background-color: #ff6b35;
            color: white;
        }

        .message.assistant .message-avatar {
            background-color: #4a90e2;
            color: white;
        }

        .message-content {
            max-width: 85%;
            background-color: #262626;
            border-radius: 18px;
            padding: 14px 16px;
            color: #e5e5e5;
            line-height: 1.5;
            word-wrap: break-word;
            font-size: 15px;
        }

        .message.user .message-content {
            background-color: #ff6b35;
            color: white;
        }

        .message.assistant .message-content {
            padding: 0;
            overflow: hidden;
        }

        .message-text-part {
            padding: 14px 16px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 12px;
            color: #aaa;
            padding: 12px 16px;
            background-color: #262626;
            border-radius: 18px;
            margin-bottom: 16px;
            width: fit-content;
        }

        .typing-dots {
            display: flex;
            gap: 5px;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background-color: #aaa;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(1); opacity: 0.4; }
            40% { transform: scale(1.3); opacity: 1; }
        }

        /* Artifact Canvas - Mobile optimized */
        .artifact-canvas {
            background-color: #0d0d0d;
            border: 1px solid #3a3a3a;
            border-radius: 12px;
            margin: 12px;
            overflow: hidden;
        }

        .artifact-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background-color: #222;
            padding: 10px 12px;
            border-bottom: 1px solid #3a3a3a;
            gap: 8px;
        }

        .artifact-title {
            font-size: 13px;
            font-weight: 500;
            color: #bbb;
        }

        .artifact-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .artifact-btn {
            background: #333;
            border: none;
            color: #ddd;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .artifact-btn:active {
            background-color: #444;
        }

        .artifact-btn.view-btn {
            background-color: #4a90e2;
            color: white;
        }

        .artifact-code {
            padding: 12px;
            max-height: 350px;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            background-color: #0a0a0a;
        }

        .artifact-code pre {
            margin: 0;
        }

        .artifact-code code {
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 12px;
            color: #e5e5e5;
            white-space: pre;
        }

        /* Auth Box */
        .auth-box {
            background-color: #262626;
            border-radius: 16px;
            padding: 16px;
            margin: 16px 0;
            border: 1px solid #3a3a3a;
        }

        .auth-btn {
            background-color: #ff6b35;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            width: 100%;
            margin-top: 12px;
        }

        .auth-btn:active {
            background-color: #e05a2b;
        }

        /* Desktop tweaks */
        @media (min-width: 768px) {
            .mobile-header {
                display: none;
            }
            
            .sidebar {
                position: relative;
                transform: translateX(0);
                width: 280px;
                box-shadow: none;
            }
            
            .sidebar-overlay {
                display: none;
            }
            
            .action-btn {
                flex: 0 1 auto;
            }
        }

        /* Utility */
        .text-sm { font-size: 13px; }
        .text-center { text-align: center; }
        .mb-2 { margin-bottom: 8px; }
        .mt-2 { margin-top: 8px; }
        .text-muted { color: #888; }
    </style>
</head>
<body>
    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg class="back-arrow" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                    Claude
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <div class="plus-icon">+</div>
                    New chat
                </button>
            </div>
            
            <div class="sidebar-nav">
                <div class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 6h-2.18c.11-.31.18-.65.18-1a2.996 2.996 0 0 0-5.5-1.65l-.5.67-.5-.68C10.96 2.54 10.05 2 9 2 7.34 2 6 3.34 6 5c0 .35.07.69.18 1H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2z"/>
                    </svg>
                    Chats
                </div>
                <div class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.11 0 2-.9 2-2V5c0-1.1-.89-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                    </svg>
                    Projects
                </div>
                <div class="nav-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                    </svg>
                    Artifacts
                </div>
            </div>
            
            <div class="sidebar-content">
                <div class="section-title">Recents</div>
                <div class="recent-items" id="recentItems">
                    <div class="empty-state">No recent conversations</div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">H</div>
                    <div class="user-details">
                        <div class="user-name">Hassan</div>
                        <div class="user-plan">Pro plan</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Mobile Header -->
            <div class="mobile-header">
                <button class="menu-btn" id="menuToggle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
                <span class="header-title" id="headerTitle">Claude</span>
                <div class="header-actions">
                    <button class="header-btn" id="mobileNewChat">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="content-area">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="greeting">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0-.39.39-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0 .39-.39.39-1.03 0-1.41l-1.06-1.06z"/>
                        </svg>
                        Good morning, Hassan
                    </div>
                    
                    <div class="search-container">
                        <textarea class="search-input" id="welcomeInput" placeholder="How can I help you today?" rows="1"></textarea>
                        <div class="search-actions">
                            <button class="send-btn" id="sendBtn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="auth-box">
                        <div class="text-center text-sm" style="color: #bbb;">
                            💡 <strong>First time?</strong> Allow the popup to enable free Claude access
                        </div>
                        <div class="text-center text-sm text-muted mt-2" id="protocolNotice"></div>
                        <button class="auth-btn" id="authButton">
                            🔐 Authenticate with Puter
                        </button>
                    </div>
                    
                    <div class="model-selector">
                        <button class="model-btn" id="modelSelector">
                            <span id="currentModel">Claude Sonnet 4</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="action-buttons">
                        <button class="action-btn" data-prompt="Help me write">
                            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                            </svg>
                            Write
                        </button>
                        <button class="action-btn" data-prompt="Teach me about">
                            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 3L1 9l4 2.18v6L12 21l7-3.82v-6L23 9l-11-6z"/>
                            </svg>
                            Learn
                        </button>
                        <button class="action-btn" data-prompt="Help me code">
                            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0L19.2 12l-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
                            </svg>
                            Code
                        </button>
                        <button class="action-btn" data-prompt="Help me with daily tasks">
                            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                            Life
                        </button>
                        <button class="action-btn" data-prompt="Help me connect my apps">
                            <svg class="action-icon" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H6.99C4.79 7 3 8.79 3 11s1.79 4 4 4H11v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1H13V17h4.01c2.2 0 4-1.79 4-4s-1.8-4-4.01-4z"/>
                            </svg>
                            Connect
                        </button>
                    </div>
                </div>

                <!-- Chat Container -->
                <div class="chat-container" id="chatContainer">
                    <div class="chat-messages" id="chatMessages"></div>
                    
                    <div class="typing-indicator" id="typingIndicator">
                        <div class="message-avatar">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
                            </svg>
                        </div>
                        <span>Claude is typing</span>
                        <div class="typing-dots">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                    
                    <div class="search-container">
                        <textarea class="search-input" id="chatInput" placeholder="Message Claude..." rows="1"></textarea>
                        <div class="search-actions">
                            <button class="model-btn" id="chatModelSelector" style="padding: 6px 12px; margin-right: 6px;">
                                <span id="chatCurrentModel">Sonnet 4</span>
                            </button>
                            <button class="send-btn" id="chatSendBtn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        const availableModels = [
            { apiName: 'claude-sonnet-4', displayName: 'Claude Sonnet 4', shortName: 'Sonnet 4' },
            { apiName: 'claude-opus-4', displayName: 'Claude Opus 4', shortName: 'Opus 4' },
            { apiName: 'claude-3-7-sonnet', displayName: 'Claude 3.7 Sonnet', shortName: 'Sonnet 3.7' }
        ];
        let currentModel = availableModels[0].apiName;
        let chatHistory = [];
        let isStreaming = false;
        let recentConversations = [];
        let currentConversationId = null;

        // DOM Elements
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const menuToggle = document.getElementById('menuToggle');
        const mobileNewChat = document.getElementById('mobileNewChat');
        const headerTitle = document.getElementById('headerTitle');

        // Mobile sidebar toggle
        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        if (menuToggle) {
            menuToggle.addEventListener('click', openSidebar);
        }
        if (sidebarOverlay) {
            sidebarOverlay.addEventListener('click', closeSidebar);
        }
        if (mobileNewChat) {
            mobileNewChat.addEventListener('click', () => {
                startNewChat();
                closeSidebar();
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Initializing Claude Mobile interface...');
            initializeInterface();
            updateModelDisplay();
            updateProtocolNotice();
        });

        function updateProtocolNotice() {
            const notice = document.getElementById('protocolNotice');
            if (notice) {
                if (window.location.protocol === 'file:') {
                    notice.innerHTML = '✅ File mode - should work fine';
                    notice.style.color = '#22c55e';
                } else {
                    notice.innerHTML = '⚠️ Server mode - allow popups';
                    notice.style.color = '#f59e0b';
                }
            }
        }

        async function handleManualAuth() {
            const authBtn = document.getElementById('authButton');
            try {
                if (authBtn) {
                    authBtn.textContent = '🔄 Authenticating...';
                    authBtn.disabled = true;
                }
                await puter.ai.chat("test", {model: 'claude-sonnet-4'});
                if (authBtn) {
                    authBtn.textContent = '✅ Authenticated';
                    authBtn.style.backgroundColor = '#22c55e';
                    setTimeout(() => {
                        const box = authBtn.closest('.auth-box');
                        if(box) box.style.display = 'none';
                    }, 2000);
                }
            } catch (error) {
                console.error('Auth failed:', error);
                if (authBtn) {
                    authBtn.textContent = '❌ Failed - Try Again';
                    authBtn.disabled = false;
                    authBtn.style.backgroundColor = '#dc2626';
                }
                alert('Authentication failed. Try in incognito mode or check your browser settings.');
            }
        }

        function initializeInterface() {
            const welcomeInput = document.getElementById('welcomeInput');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const chatSendBtn = document.getElementById('chatSendBtn');
            const newChatBtn = document.getElementById('newChatBtn');
            const actionBtns = document.querySelectorAll('.action-btn');
            const modelSelectors = document.querySelectorAll('#modelSelector, #chatModelSelector');
            const authButton = document.getElementById('authButton');

            if (authButton) authButton.addEventListener('click', handleManualAuth);

            [welcomeInput, chatInput].forEach(textarea => {
                if (textarea) {
                    textarea.addEventListener('input', () => autoResize(textarea));
                    textarea.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            if (textarea === welcomeInput) handleWelcomeMessage();
                            else handleChatMessage();
                        }
                    });
                }
            });

            if (sendBtn) sendBtn.addEventListener('click', handleWelcomeMessage);
            if (chatSendBtn) chatSendBtn.addEventListener('click', handleChatMessage);
            if (newChatBtn) newChatBtn.addEventListener('click', () => {
                startNewChat();
                closeSidebar();
            });

            actionBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const prompt = this.getAttribute('data-prompt');
                    if (prompt && welcomeInput) {
                        welcomeInput.value = prompt;
                        welcomeInput.focus();
                        autoResize(welcomeInput);
                    }
                });
            });

            modelSelectors.forEach(selector => {
                if (selector) selector.addEventListener('click', toggleModel);
            });

            if (welcomeInput) welcomeInput.focus();
        }

        function updateModelDisplay() {
            const model = availableModels.find(m => m.apiName === currentModel);
            document.getElementById('currentModel').textContent = model.displayName;
            document.getElementById('chatCurrentModel').textContent = model.shortName;
        }

        function toggleModel() {
            const idx = availableModels.findIndex(m => m.apiName === currentModel);
            currentModel = availableModels[(idx + 1) % availableModels.length].apiName;
            updateModelDisplay();
        }

        async function handleWelcomeMessage() {
            const input = document.getElementById('welcomeInput');
            const msg = input.value.trim();
            if (!msg || isStreaming) return;
            createNewConversation(msg);
            switchToChatView();
            await sendMessage(msg);
        }

        async function handleChatMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg || isStreaming) return;
            input.value = '';
            autoResize(input);
            await sendMessage(msg);
        }

        function createNewConversation(firstMessage) {
            currentConversationId = 'conv_' + Date.now();
            const title = firstMessage.length > 40 ? firstMessage.substring(0, 40) + '...' : firstMessage;
            recentConversations.unshift({
                id: currentConversationId,
                title: title,
                messages: [],
                timestamp: new Date(),
                model: currentModel
            });
            if (recentConversations.length > 10) recentConversations.pop();
            updateRecentItems();
        }

        function updateRecentItems() {
            const container = document.getElementById('recentItems');
            container.innerHTML = '';
            if (!recentConversations.length) {
                container.innerHTML = '<div class="empty-state">No recent conversations</div>';
                return;
            }
            recentConversations.forEach(conv => {
                const div = document.createElement('div');
                div.className = 'recent-item';
                div.textContent = conv.title;
                div.addEventListener('click', () => {
                    loadConversation(conv.id);
                    closeSidebar();
                });
                container.appendChild(div);
            });
        }

        function loadConversation(id) {
            const conv = recentConversations.find(c => c.id === id);
            if (!conv) return;
            currentConversationId = id;
            chatHistory = [...conv.messages];
            currentModel = conv.model;
            updateModelDisplay();
            switchToChatView();
            const msgs = document.getElementById('chatMessages');
            msgs.innerHTML = '';
            conv.messages.forEach(m => addMessage(m.content, m.role));
            headerTitle.textContent = conv.title;
        }

        function switchToChatView() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('chatContainer').classList.add('active');
            headerTitle.textContent = 'Chat';
        }

        function startNewChat() {
            chatHistory = [];
            currentConversationId = null;
            currentModel = availableModels[0].apiName;
            updateModelDisplay();
            
            document.getElementById('welcomeScreen').style.display = 'flex';
            document.getElementById('chatContainer').classList.remove('active');
            document.getElementById('chatMessages').innerHTML = '';
            document.getElementById('welcomeInput').value = '';
            headerTitle.textContent = 'Claude';
            autoResize(document.getElementById('welcomeInput'));
        }

        async function sendMessage(message) {
            if (isStreaming) return;
            
            addMessage(message, 'user');
            showTypingIndicator();
            setInputState(false);
            chatHistory.push({ role: 'user', content: message });
            
            try {
                isStreaming = true;
                const response = await puter.ai.chat(chatHistory, {
                    model: currentModel,
                    stream: true
                });
                
                const { messageContent } = addMessage('', 'assistant');
                hideTypingIndicator();
                let fullResponse = '';
                
                for await (const part of response) {
                    if (part?.text) {
                        fullResponse += part.text;
                        renderFormattedMessage(fullResponse, messageContent);
                        scrollToBottom();
                    }
                }
                
                renderFormattedMessage(fullResponse, messageContent);
                chatHistory.push({ role: 'assistant', content: fullResponse });
                updateCurrentConversation();
                
            } catch (error) {
                console.error('Error:', error);
                hideTypingIndicator();
                addMessage('Error: ' + (error.message || 'Unknown error'), 'assistant', true);
                if (chatHistory.length && chatHistory[chatHistory.length-1].role === 'user') {
                    chatHistory.pop();
                }
            } finally {
                isStreaming = false;
                setInputState(true);
                document.getElementById('chatInput')?.focus();
            }
        }

        function updateCurrentConversation() {
            if (!currentConversationId) return;
            const conv = recentConversations.find(c => c.id === currentConversationId);
            if (conv) {
                conv.messages = [...chatHistory];
                conv.timestamp = new Date();
            }
        }

        function addMessage(content, role, isError = false) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = role === 'user' ? 'H' : '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (role === 'assistant') renderFormattedMessage(content, contentDiv);
            else contentDiv.textContent = content;
            
            if (isError) contentDiv.style.color = '#ff6b6b';
            
            div.appendChild(avatar);
            div.appendChild(contentDiv);
            container.appendChild(div);
            scrollToBottom();
            return { messageContent: contentDiv };
        }

        function renderFormattedMessage(content, container) {
            container.innerHTML = '';
            const regex = /```(\w*)\n([\s\S]*?)```/g;
            let lastIdx = 0, match;
            
            while ((match = regex.exec(content)) !== null) {
                if (match.index > lastIdx) {
                    const text = document.createElement('div');
                    text.className = 'message-text-part';
                    text.textContent = content.substring(lastIdx, match.index);
                    container.appendChild(text);
                }
                container.appendChild(createArtifactCanvas(match[2].trim(), match[1] || 'text'));
                lastIdx = match.index + match[0].length;
            }
            
            if (lastIdx < content.length) {
                const text = document.createElement('div');
                text.className = 'message-text-part';
                text.textContent = content.substring(lastIdx);
                container.appendChild(text);
            }
        }

        function createArtifactCanvas(code, language) {
            const canvas = document.createElement('div');
            canvas.className = 'artifact-canvas';
            
            const header = document.createElement('div');
            header.className = 'artifact-header';
            header.innerHTML = `<div class="artifact-title">${language || 'code'}</div>`;
            
            const actions = document.createElement('div');
            actions.className = 'artifact-actions';
            
            const copyBtn = document.createElement('button');
            copyBtn.className = 'artifact-btn';
            copyBtn.textContent = 'Copy';
            copyBtn.onclick = () => navigator.clipboard?.writeText(code);
            
            actions.appendChild(copyBtn);
            header.appendChild(actions);
            
            const codeArea = document.createElement('div');
            codeArea.className = 'artifact-code';
            const pre = document.createElement('pre');
            const codeEl = document.createElement('code');
            codeEl.textContent = code;
            pre.appendChild(codeEl);
            codeArea.appendChild(pre);
            
            canvas.appendChild(header);
            canvas.appendChild(codeArea);
            return canvas;
        }

        function showTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'flex';
            scrollToBottom();
        }

        function hideTypingIndicator() {
            document.getElementById('typingIndicator').style.display = 'none';
        }

        function setInputState(enabled) {
            ['welcomeInput', 'chatInput', 'sendBtn', 'chatSendBtn'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.disabled = !enabled;
                    el.style.opacity = enabled ? '1' : '0.5';
                }
            });
        }

        function scrollToBottom() {
            const el = document.getElementById('chatMessages');
            if (el) el.scrollTop = el.scrollHeight;
        }

        function autoResize(textarea) {
            if (!textarea) return;
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
        }
    </script>
</body>
</html>
